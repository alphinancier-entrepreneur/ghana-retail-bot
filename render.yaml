# Render.com — free web service, auto-deploys from GitHub
# Docs: https://render.com/docs/deploy-node-express-app

services:
  - type: web
    name: ghana-retail-bot
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: PUBLIC_WEBHOOK_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: DAILY_FREE_LIMIT
        sync: false
      - key: UNLIMITED_USERS
        sync: false
      - key: TWILIO_DAILY_MESSAGE_CAP
        sync: false
      - key: DISABLE_USAGE_LIMITS
        sync: false
